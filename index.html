<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Google Apps Script App</title>

  <link rel="icon" href="https://static.vecteezy.com/system/resources/previews/016/716/181/large_2x/website-3d-icon-png.png">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:Arial,sans-serif;
      background:#f1f5f9;
    }

    .iframe-container{
      position:relative;
      width:100%;
      height:100vh;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      background:white;
    }

    .loader{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:white;
      padding:15px 25px;
      border-radius:12px;
      box-shadow:0 5px 20px rgba(0,0,0,0.15);
      font-size:18px;
      color:#2563eb;
      z-index:999;
    }

  </style>
</head>

<body>

<div class="iframe-container">

  <div class="loader" id="loader">
    Loading Google Apps Script...
  </div>

  <iframe
    src="https://script.google.com/macros/s/AKfycbwEBtIwUAzdXaEvkDbMR63UdLuafm7G5e7XEUWJk16HJ43HQ2f5I6tnuuS8hbZQqdhdfw/exec"
    onload="document.getElementById('loader').style.display='none';"
    allowfullscreen>
  </iframe>

</div>

</body>
</html>
